name: CI - Build and Push Docker Image

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      DOPPLER_TOKEN:
        required: true
    outputs:
      app_version:
        description: "Wersja obrazu (timestamp YYYYMMDDHHMM)"
        value: ${{ jobs.build_and_push.outputs.app_version }}
      frontend_image:
        description: "Pełna nazwa obrazu z tagiem wersji"
        value: ${{ jobs.build_and_push.outputs.frontend_image }}

env:
  IMAGE_REPO: praca.strona.arturscibor.pl

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      frontend_image: ${{ steps.version.outputs.frontend_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set APP_VERSION timestamp
        id: version
        run: |
          APP_VERSION=$(date +%Y%m%d%H%M)
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ secrets.DOCKER_USERNAME }}/${IMAGE_REPO}:$APP_VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # Vite wypieka VITE_* do bundla w trakcie builda, więc zmienne z Dopplera
      # wchodzą jako --build-arg. W runtime (nginx ze statykami) nie da się ich podmienić.
      - name: Build Docker image (env z Dopplera jako build-arg)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project frontend_job --config prd -- bash -c '
            docker build . \
              --file infra/dockerfiles/dockerfile/production.dockerfile \
              --build-arg VITE_URL_SERVER="$VITE_URL_SERVER" \
              -t "${{ secrets.DOCKER_USERNAME }}/${IMAGE_REPO}:${APP_VERSION}" \
              -t "${{ secrets.DOCKER_USERNAME }}/${IMAGE_REPO}:latest"
          '

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_REPO}:${APP_VERSION}
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_REPO}:latest
