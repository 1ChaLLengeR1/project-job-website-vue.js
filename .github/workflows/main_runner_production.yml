name: Runner - Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/main_ci_production.yml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  cd:
    needs: ci
    uses: ./.github/workflows/main_cd_production.yml
    with:
      frontend_image: ${{ needs.ci.outputs.frontend_image }}
    secrets:
      ANSIBLE_PASSWORD: ${{ secrets.ANSIBLE_PASSWORD }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      TARGET_HOST: ${{ secrets.TARGET_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

  report:
    needs: [ci, cd]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "ci (build+push): ${{ needs.ci.result }}"
          echo "cd (ansible):    ${{ needs.cd.result }}"
          if [ "${{ needs.cd.result }}" != "success" ]; then
            echo "Pipeline produkcyjny NIE zakończył się sukcesem."
            exit 1
          fi
