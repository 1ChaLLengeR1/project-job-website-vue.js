---
# Traefika stawia stack backendu; tu tylko upewniamy się, że sieć overlay istnieje,
# zanim podepniemy pod nią stack frontendu.
- name: Utwórz sieć overlay traefik-public (idempotentnie)
  ansible.builtin.command:
    cmd: docker network create --driver overlay --attachable traefik-public
  register: network_result
  failed_when: network_result.rc != 0 and 'already exists' not in network_result.stderr
  changed_when: network_result.rc == 0
