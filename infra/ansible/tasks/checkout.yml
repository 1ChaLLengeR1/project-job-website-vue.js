---
- name: Usuń poprzedni katalog deploy
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    state: absent

- name: Utwórz katalog deploy
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    state: directory
    mode: "0755"

- name: Sklonuj repozytorium (HTTPS + PAT)
  ansible.builtin.git:
    repo: "{{ repo_https_url }}"
    dest: "{{ deploy_dir }}"
    version: "{{ repo_branch }}"
    depth: 1
  no_log: true

- name: Usuń token PAT z .git/config
  ansible.builtin.command:
    cmd: git remote set-url origin {{ repo_public_url }}
    chdir: "{{ deploy_dir }}"
  changed_when: true
