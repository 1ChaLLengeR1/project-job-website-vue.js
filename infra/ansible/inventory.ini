[production]
# Klucz SSH dostarcza ssh-agent w workflow CD (webfactory/ssh-agent).
# PubkeyAcceptedKeyTypes=+ssh-rsa - klient OpenSSH 9.x domyslnie odrzuca stary
# algorytm ssh-rsa (SHA-1), ktorego wymaga klucz id_rsa na tym serwerze.
__TARGET_HOST__ ansible_user=__SSH_USER__ ansible_ssh_common_args='-o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa'
