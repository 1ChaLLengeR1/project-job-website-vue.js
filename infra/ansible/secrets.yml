# Szablon sekretów infrastrukturalnych (ansible-vault).
#
# 1. Uzupełnij wartości.
# 2. Zaszyfruj: ANSIBLE_PASSWORD='haslo' make vault_encrypt
# 3. Commituj WYŁĄCZNIE zaszyfrowany secrets.yml.
#
# Zmienne aplikacji (VITE_*) żyją w Dopplerze (projekt frontend_job, config prd)
# i są wstrzykiwane jako --build-arg w CI — Vite wypieka je do bundla przy buildzie,
# więc na serwerze nie są już do niczego potrzebne. Tu trzymamy wyłącznie sekrety
# infrastrukturalne potrzebne do deployu.

git_pat: "github_pat_CHANGE_ME"
docker_hub_username: "arturscibor"
docker_hub_password: "CHANGE_ME"
# Haslo sudo uzytkownika deployowego na serwerze (become: true w playbooku).
# Jesli user ma sudo NOPASSWD - zostaw pusty string.
sudo_password: "CHANGE_ME"
